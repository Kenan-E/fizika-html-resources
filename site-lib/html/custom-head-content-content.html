<style>
/* Teqi düzgün şəkildə span olaraq hədəf alırıq */
span.math.math-block.is-loaded {
    display: block !important; /* span-ın scroll xassəsini qəbul etməsi üçün mütləqdir */
    width: 100% !important;
    overflow-x: auto !important;
    overflow-y: hidden !important;
    -webkit-overflow-scrolling: touch;
}

/* Cədvəl formatında olan MathJax strukturları üçün */
span.math.math-block.is-loaded mjx-container,
span.math.math-block.is-loaded mjx-table {
    min-width: max-content !important;
}

/* Daxildəki digər span elementlərinin sıxılmaması üçün */
span.math.math-block.is-loaded span {
    display: inline-block !important;
    min-width: max-content !important;
}

/* Optional: prevent flicker during theme switches */
img {
  break-inside: avoid;
  page-break-inside: avoid !important;
  transition: opacity 0.15s ease;
}
.theme-dark img[alt^="Board"] {
  filter: invert(0);
}
.theme-light img[alt="Board 26.1.svg"] {
  filter: none !important;
}
.theme-light img[alt^="Board"] {
  filter: invert(1);
}
</style>

function updateColorDiagram() {
    const isDark = document.body.classList.contains("theme-dark");
    const src = isDark ? DARK_SVG : LIGHT_SVG;

    document.querySelectorAll('[alt="Board 26.1.svg"]').forEach(el => {

        if ("src" in el) {
            el.src = src;
        }

        el.setAttribute("src", src);


        if (el.hasAttribute("data-src")) {
            el.setAttribute("data-src", src);
        }
    });
}

document.addEventListener("DOMContentLoaded", updateColorDiagram);

new MutationObserver(updateColorDiagram).observe(document.body, {
    attributes: true,
    attributeFilter: ["class"]
});

new MutationObserver(updateColorDiagram).observe(document.body, {
    childList: true,
    subtree: true
});
